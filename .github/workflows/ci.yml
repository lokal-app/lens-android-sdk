name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Build SDK modules
        run: ./gradlew :lens-api:assemble :lens:assembleDebug :lens:assembleRelease :lens-noop:assembleRelease

      - name: Run unit tests
        run: ./gradlew :lens:testDebugUnitTest

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug