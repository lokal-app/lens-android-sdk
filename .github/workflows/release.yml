name: Release

on:
  release:
    types: [ published ]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Build SDK modules
        run: ./gradlew :lens-api:assemble :lens:assembleDebug :lens:assembleRelease :lens-noop:assembleRelease

      - name: Run unit tests
        run: ./gradlew :lens:testDebugUnitTest

      - name: Check signing secrets
        run: |
          if [ -z "$KEY" ]; then echo "GPG_SIGNING_KEY is EMPTY"; else echo "GPG_SIGNING_KEY length: ${#KEY}"; fi
          if [ -z "$KEY_ID" ]; then echo "GPG_SIGNING_KEY_ID is EMPTY"; else echo "GPG_SIGNING_KEY_ID: $KEY_ID"; fi
          if [ -z "$KEY_PASS" ]; then echo "GPG_SIGNING_PASSWORD is EMPTY"; else echo "GPG_SIGNING_PASSWORD is set"; fi
        env:
          KEY: ${{ secrets.GPG_SIGNING_KEY }}
          KEY_ID: ${{ secrets.GPG_SIGNING_KEY_ID }}
          KEY_PASS: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Publish to Maven Central
        run: |
          ./gradlew publishAllPublicationsToMavenCentralRepository \
            --no-configuration-cache \
            -PsigningInMemoryKey="${{ secrets.GPG_SIGNING_KEY }}" \
            -PsigningInMemoryKeyId="${{ secrets.GPG_SIGNING_KEY_ID }}" \
            -PsigningInMemoryKeyPassword="${{ secrets.GPG_SIGNING_PASSWORD }}"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Publish to GitHub Packages
        run: |
          ./gradlew :lens-api:publishAllPublicationsToGitHubPackagesRepository \
            :lens:publishAllPublicationsToGitHubPackagesRepository \
            :lens-noop:publishAllPublicationsToGitHubPackagesRepository \
            --no-configuration-cache \
            -PsigningInMemoryKey="${{ secrets.GPG_SIGNING_KEY }}" \
            -PsigningInMemoryKeyId="${{ secrets.GPG_SIGNING_KEY_ID }}" \
            -PsigningInMemoryKeyPassword="${{ secrets.GPG_SIGNING_PASSWORD }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lens/build/outputs/aar/lens-release.aar
            lens-noop/build/outputs/aar/lens-noop-release.aar
            lens-api/build/libs/lens-api-*.jar